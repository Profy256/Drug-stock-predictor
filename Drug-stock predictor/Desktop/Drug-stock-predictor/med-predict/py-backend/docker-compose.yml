version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: med-predict-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: med_predict
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init_schema.sql:/docker-entrypoint-initdb.d/001_init_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - med-predict-network

  # Python Backend
  backend:
    build: .
    container_name: med-predict-backend
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/med_predict
      JWT_SECRET: your-secret-key-change-in-production-123456
      ENV: production
      DEBUG: "False"
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - med-predict-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:

networks:
  med-predict-network:
    driver: bridge
