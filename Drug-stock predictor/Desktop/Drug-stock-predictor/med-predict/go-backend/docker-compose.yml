version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: medpredict-db
    environment:
      POSTGRES_DB: medpredict
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medpredict-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: medpredict
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 8080
      GIN_MODE: debug
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: dev-secret-change-in-production
      LOG_LEVEL: debug
      ENV: development
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.git

volumes:
  postgres_data:

networks:
  default:
    name: medpredict-network
