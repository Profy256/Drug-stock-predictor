# ============================================================
# docker-compose.yml — MED PREDICT SYSTEM
# Run: docker-compose up -d
# ============================================================
version: '3.9'

services:
  # ── PostgreSQL database ──────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: med_predict
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (job queue) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  # ── Node.js Backend ──────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: med_predict
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-localdev}
      JWT_SECRET: ${JWT_SECRET:-local_dev_secret_change_in_prod}
      CREDENTIAL_SALT: ${CREDENTIAL_SALT:-local_salt_change_in_prod}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-twilio}
      TZ: Africa/Kampala
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  # ── React Frontend (Vite dev server) ────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  pgdata:
